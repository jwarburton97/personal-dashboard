<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<div class="auth-container">
  <h1 class="glass-header">Personal Dashboard</h1>

  <div class="split-container">
    <!-- Left Side - Login -->
    <div class="auth-side login-side">
      <h2>Welcome Back!</h2>

      <form>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" />

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <button class="gsi-material-button">
        <div class="gsi-material-button-state"></div>
        <div class="gsi-material-button-content-wrapper">
          <div class="gsi-material-button-icon">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
              <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
          </div>
          <span class="gsi-material-button-contents">Sign in with Google</span>
          <span style="display: none;">Sign in with Google</span>
        </div>
      </button>

      <button class="social-button github-button">
        <i class="fab fa-github"></i>
        <span>Sign in with GitHub</span>
      </button>

      <button class="social-button apple-button">
        <i class="fab fa-apple"></i>
        <span>Sign in with Apple</span>
      </button>
    </div>

    <!-- Center Divider -->
    <div class="vertical-divider"></div>

    <!-- Right Side - Sign Up -->
    <div class="auth-side signup-side" [class.expanded]="showSignupForm">
      <div class="signup-trigger" *ngIf="!showSignupForm" (click)="toggleSignupForm()">
        <h2>New Here?</h2>
        <p class="click-hint">Click to create an account</p>
      </div>

      <div class="signup-form-container" *ngIf="showSignupForm">
        <div class="header-with-back">
          <button class="back-btn" (click)="toggleSignupForm()">←</button>
          <h2>Create Account</h2>
        </div>

        <form>
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="Enter First Name" required/>

          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Enter Last Name" required/>

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter Email Address" required />

          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="signupPassword" placeholder="Enter Strong Password"
                 pattern="^(?=.*[A-Z])(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,16}$"
                 title="8-16 characters, at least 1 uppercase letter and 1 special character"
                 required/>

          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>
