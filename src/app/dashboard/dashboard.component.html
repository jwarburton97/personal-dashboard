<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<div class="dashboard-container">
  <header class="dashboard-header">
    <img src="dashboard-logo.jpg" alt="Dashboard Logo" class="dashboard-logo" />
    <div class="header-actions">
      <button class="profile-btn" routerLink="/profile">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </button>
      <button class="logout-btn" (click)="logout()">
        <span>Logout</span>
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <main class="dashboard-content">
    <div class="welcome-card">
      <h2>Welcome back<span *ngIf="firstName">, {{ firstName }}</span>!</h2>

      <div class="stats-grid">
        <div class="stat-card widget-card">
          <app-weather></app-weather>
        </div>

        <div class="stat-card widget-card">
          <app-stocks></app-stocks>
        </div>

        <div class="stat-card">
          <div class="stat-icon">📝</div>
          <div class="stat-info">
            <h3>Tasks</h3>
            <p>Coming soon</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">📈</div>
          <div class="stat-info">
            <h3>Analytics</h3>
            <p>Coming soon</p>
          </div>
        </div>
      </div>
    </div>

    <div class="info-card">
      <h3>🎉 You're all set!</h3>
      <p>Your authentication is working. Start building your dashboard features!</p>
    </div>
  </main>
</div>
